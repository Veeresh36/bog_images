<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="420" fill="#FAF8F4"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1612">How a QUERY Request Flows</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#7A6E64">Client → Server → Cache, step by step</text>

  <!-- Client box -->
  <rect x="30" y="150" width="150" height="90" rx="14" fill="#1A1612"/>
  <text x="105" y="188" text-anchor="middle" font-size="15" font-weight="700" fill="#FAF8F4">Client</text>
  <text x="105" y="210" text-anchor="middle" font-size="11" fill="#C9C2B8">builds JSON body</text>
  <text x="105" y="226" text-anchor="middle" font-size="11" fill="#C9C2B8">+ Content-Type</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="195" x2="300" y2="195" stroke="#E60023" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="240" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#E60023">QUERY /products</text>

  <!-- Server box -->
  <rect x="300" y="140" width="180" height="110" rx="14" fill="#E60023"/>
  <text x="390" y="175" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Server</text>
  <text x="390" y="197" text-anchor="middle" font-size="11" fill="#FFE5E8">checks Content-Type</text>
  <text x="390" y="213" text-anchor="middle" font-size="11" fill="#FFE5E8">parses body safely</text>
  <text x="390" y="229" text-anchor="middle" font-size="11" fill="#FFE5E8">runs read-only search</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="195" x2="600" y2="195" stroke="#E60023" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="540" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#E60023">200 OK + results</text>

  <!-- Cache box -->
  <rect x="600" y="150" width="180" height="90" rx="14" fill="#EDEAE4"/>
  <text x="690" y="188" text-anchor="middle" font-size="15" font-weight="700" fill="#1A1612">Cache / CDN</text>
  <text x="690" y="210" text-anchor="middle" font-size="11" fill="#7A6E64">stores response,</text>
  <text x="690" y="226" text-anchor="middle" font-size="11" fill="#7A6E64">since QUERY is safe</text>

  <!-- Error branch -->
  <line x1="390" y1="250" x2="390" y2="320" stroke="#9C8E84" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowgrey)"/>
  <rect x="230" y="320" width="320" height="70" rx="12" fill="#FFFFFF" stroke="#DDD7CE"/>
  <text x="390" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#3D3530">If something's wrong, respond with:</text>
  <text x="390" y="365" text-anchor="middle" font-size="11" fill="#7A6E64">400 no Content-Type · 415 bad format · 422 bad body</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E60023"/>
    </marker>
    <marker id="arrowgrey" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9C8E84"/>
    </marker>
  </defs>
</svg>
